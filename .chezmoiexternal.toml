[".config/bat/themes"]
exact = true
include = ["*/themes/*.tmTheme"]
refreshPeriod = "168h"
stripComponents = 2
type = "archive"
url = "https://github.com/catppuccin/bat/archive/main.tar.gz"

[".config/eza/themes"]
exact = true
include = ["*/themes/**"]
refreshPeriod = "168h"
stripComponents = 2
type = "archive"
url = "https://github.com/catppuccin/eza/archive/main.tar.gz"

[".config/ghostty/themes"]
exact = true
include = ["*/themes/*.conf"]
refreshPeriod = "168h"
stripComponents = 2
type = "archive"
url = "https://github.com/catppuccin/ghostty/archive/main.tar.gz"

[".config/helix/themes"]
exact = true
include = ["*/themes/default/*.toml"]
refreshPeriod = "168h"
stripComponents = 3
type = "archive"
url = "https://github.com/catppuccin/helix/archive/main.tar.gz"
