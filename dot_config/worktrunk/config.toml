# Worktrunk user config — hooks and path apply to every repository.
# See https://worktrunk.dev/hook/ and https://worktrunk.dev/config/

# Pin the sibling / dot / slash-sanitized worktree path so per-host git identity and
# 1Password signing keep applying (ADR-0002). This matches worktrunk's current default;
# pinned explicitly so an upstream default change can't silently break corp signing.
worktree-path = "{{ repo_path }}/../{{ repo }}.{{ branch | sanitize }}"

# Blocking: prep the environment (mise first, direnv fallback — Q13) and symlink the
# canonical muxy layouts into this worktree (ADR-0003). Both finish before "ready".
[pre-start]
env = 'cd "{{ worktree_path }}" && if [ -f mise.toml ] || [ -f .mise.toml ] || [ -f .config/mise/config.toml ] || [ -f .tool-versions ]; then mise trust && mise install; elif [ -f .envrc ]; then direnv allow; fi'
layouts = 'mkdir -p "{{ worktree_path }}/.muxy" && ln -sfn "$HOME/.config/muxy/layouts" "{{ worktree_path }}/.muxy/layouts"'

# Background: register the new worktree with muxy and focus it; the layout picker
# then appears for a one-click bootstrap (Q5). Auto-expand in muxy is the safety net.
[post-start]
muxy = 'muxy refresh-worktrees "{{ repo_path }}" && muxy switch-worktree "{{ worktree_path }}"'
