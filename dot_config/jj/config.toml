#:tombi schema.strict = false

"$schema" = "https://jj-vcs.dev/latest/config-schema.json"

[user]
name = "Michael Goodness"
email = "mike@opsgoodness.net"

[aliases]
aliases = ["config", "list", "aliases"]
amend = ["squash"]
fixup = ["util", "exec", "--", "sh", "-c", "jj squash && jj upload"]
stash = ["new", "@-"]

[ui]
default-command = "log"
diff-formatter = ":git"
pager = ["delta"]
