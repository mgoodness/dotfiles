# App-work layout: agent + editor as tabs in the upper pane; shell, dev server, and
# test runner share the band as tabs (background tabs keep running while hidden).
# server/tests are named-only — canonical layouts stay repo-agnostic, so run your
# stack's command in them (or replace the symlink with a bespoke layout per ADR-0003).
layout: vertical
panes:
  - tabs:
      - command: claude
        name: agent
      - command: hx .
        name: editor
  - tabs:
      - name: shell
      - name: server
      - name: tests
