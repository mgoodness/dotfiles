# Everyday layout: agent + editor as tabs in the upper pane, one shell in the band.
# Splits are equal (muxy has no ratio field) — drag the divider to ~80/20 once and
# muxy persists it per worktree, since layouts apply only at bootstrap.
layout: vertical
panes:
  - tabs:
      - command: claude
        name: agent
      - command: hx .
        name: editor
  - tabs:
      - name: shell
