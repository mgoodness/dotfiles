# Infra layout: agent + editor as tabs in the upper pane; shell and a watch tab in
# the band (e.g. `kubectl get pods -w` or `terraform plan`).
# watch is named-only — canonical layouts stay repo-agnostic, so run the command you
# need in it (or replace the symlink with a bespoke layout per ADR-0003).
layout: vertical
panes:
  - tabs:
      - command: claude
        name: agent
      - command: hx .
        name: editor
  - tabs:
      - name: shell
      - name: watch
