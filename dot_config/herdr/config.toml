onboarding = false
[ui]
agent_panel_sort = "spaces"

# herdr-worktrunk plugin keybindings, per its own recommendation: override the
# built-in "new worktree" key (prefix+shift+g) with worktrunk's switch/create
# picker so worktrunk's hooks run instead of herdr's plain `worktree create`.
show_agent_labels_on_pane_borders = true
[[keys.command]]
command = "worktrunk.open"
description = "Worktree: switch / create from default branch"
key = "prefix+shift+g"
type = "plugin_action"

[[keys.command]]
command = "worktrunk.open-current"
description = "Worktree: switch / create from current branch"
key = "prefix+shift+c"
type = "plugin_action"

[[keys.command]]
command = "worktrunk.remove"
description = "Worktree: remove"
key = "prefix+shift+d"
type = "plugin_action"

# Catppuccin Frappe (dark) / Latte (light), auto-switching with system
# appearance — same pairing as bat (dot_config/bat/config), Helix
# (dot_config/helix/config.toml), and Ghostty (dot_config/ghostty/config).
[theme]
auto_switch = true
dark_name = "catppuccin"
light_name = "catppuccin-latte"
name = "catppuccin"

[ui.toast]
delivery = "terminal"
