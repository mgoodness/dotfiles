# Ref: https://codeberg.org/jsu/dotfiles/src/branch/main/.prettierrc.toml

objectWrap = "collapse"
printWidth = 120
proseWrap = "never"
semi = false
singleQuote = true
tabWidth = 4

# https://github.com/prettier/prettier/issues/15956
[[overrides]]
files = ["*.json", "*.jsonc"]
options = { trailingComma = "none" }

[[overrides]]
files = ["*.yaml", "*.yml"]
options = { tabWidth = 2 }
